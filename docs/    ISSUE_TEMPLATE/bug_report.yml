name: Bug report
description: Report a bug or broken simulator behavior
title: "[BUG] "
labels:
  - bug
  - beta
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Phoenix public beta.

        Use this form for:
        - broken controls
        - drill logic problems
        - scoring/debrief mismatches
        - UI/mobile issues
        - anything clearly not behaving as intended

  - type: dropdown
    id: drill
    attributes:
      label: Drill or area
      options:
        - quickstart
        - vsag
        - phaseerr
        - overcurrent
        - stuck
        - combined
        - free run / general simulator
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: iPhone 15 / Safari or Pixel 8 / Chrome
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      placeholder: After I closed the breaker in overcurrent, the fault never injected.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Overcurrent should inject after breaker close and start the stable window.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open simulator
        2. Start overcurrent drill
        3. Start sim, grid, generator
        4. Close breaker
        5. Observe behavior
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Screenshot or log excerpt
      placeholder: Paste log lines or attach a screenshot if available
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I tested this on the current public beta runtime
          required: true
