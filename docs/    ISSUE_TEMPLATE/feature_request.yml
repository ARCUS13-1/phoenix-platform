name: Feature request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels:
  - enhancement
  - beta
body:
  - type: markdown
    attributes:
      value: |
        Use this form for future improvements.

  - type: input
    id: summary
    attributes:
      label: Feature summary
      placeholder: Add an energy-flow visual from source to generator to electrical output
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Training experience
        - Scenario engine
        - UI / UX
        - Physics / realism
        - Analysis / logging
        - Mobile usability
        - Docs / onboarding
        - Branding / presentation
        - Other
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this exist?
      placeholder: This would make the simulator easier for beginners to understand and more expandable for future modules.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      placeholder: Keep it single-file if possible.
    validations:
      required: false
